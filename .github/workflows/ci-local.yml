name: CI local

on: [push]

env:
  DB_HOST: 127.0.0.1
  DB_USER: root
  DB_PASSWORD: root
  DB_NAME: todolist_db
  NODE_ENV: test

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: todolist_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration du JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin' 
          cache: 'maven'        

      - name: Donner les permissions d'exécution au wrapper Maven
        run: chmod +x mvnw

      - name: Exécuter les tests Spring Boot
        run: ./mvnw clean test

      - name: Upload du rapport de build / tests (Optional)
        if: always() # S'exécute même si les tests échouent pour voir les rapports d'erreurs
        uses: actions/upload-artifact@v4
        with:
          name: target-report
          path: target/surefire-reports/ 
          retention-days: 7